{% extends "base.html" %}

{% block title %}Home - GeoTemporal Analyzer{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">GeoTemporal Analyzer</h1>
    
    <h5 class="mb-3">Choose a Date:</h5>
    <div id="dateBar" class="date-bar mb-4"></div>
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 mb-0">Updating map with new date...</p>
            <small id="loadingStatus">Please wait</small>
        </div>
    <div id="map" style="height: 680px; border: 2px solid #555; border-radius: 8px;"></div>\

</div>
{% endblock %}
