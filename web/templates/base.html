<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}GeoTemporal Analyzer{% endblock %}</title>
    <meta name="description" content="FYP Image Prediction Interface for deep learning-based land use classification">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='css/project logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/darkly/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    {% block extra_head %}{% endblock %}
    
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
      <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="{{ url_for('index') }}">
          <i class="bi bi-layers me-2"></i>GeoTemporal Analyzer
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <!-- Navigation Links -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link {% if request.path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">Home</a></li>
            <!-- <li class="nav-item"><a class="nav-link {% if request.path == url_for('snapshots') %}active{% endif %}" href="{{ url_for('snapshots') }}">Snapshots</a></li> -->
            <li class="nav-item"><a class="nav-link {% if request.path == url_for('categories') %}active{% endif %}" href="{{ url_for('categories') }}">Categories</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content Wrapper -->
    <div class="wrapper">
      {% block content %}{% endblock %}
    </div>
    
    <footer class="text-center py-4">
      <div class="container">
        <span>2025 Isaac Attard GeoTemporal Analyzer. All rights reserved</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> <!-- Bootstrap Bundle JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script> <!-- Leaflet.js JS -->
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/temporal_map.js') }}"></script>
    <script src="{{ url_for('static', filename='js/slider.js') }}"></script>
    <script src="{{ url_for('static', filename='js/categories.js') }}"></script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
